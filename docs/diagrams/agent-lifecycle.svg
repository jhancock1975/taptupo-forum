<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" width="760" height="320" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="13">
  <style>
    .box { fill: #ffffff; stroke: #2d5b8f; stroke-width: 1.5; rx: 8; }
    .no { fill: #fbe9e9; stroke: #a23b3b; }
    .yes { fill: #e9f6ec; stroke: #2f7a3d; }
    .label { fill: #1b1b1b; text-anchor: middle; }
    .sub { fill: #6a6a6a; text-anchor: middle; font-size: 11px; }
    .arrow { stroke: #2d5b8f; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
    .title { font-weight: 700; font-size: 16px; text-anchor: middle; }
    .edge { fill: #2d5b8f; font-size: 11px; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2d5b8f"/>
    </marker>
  </defs>

  <text x="380" y="28" class="title">BaseAgent.decide_to_respond pipeline</text>

  <rect x="20"  y="120" width="120" height="60" class="box"/>
  <text x="80"  y="145" class="label">new post</text>
  <text x="80"  y="163" class="sub">post.content</text>

  <rect x="180" y="120" width="140" height="60" class="box"/>
  <text x="250" y="145" class="label">expertise match?</text>
  <text x="250" y="163" class="sub">substring on keywords</text>

  <rect x="360" y="120" width="140" height="60" class="box"/>
  <text x="430" y="145" class="label">probability gate</text>
  <text x="430" y="163" class="sub">rng vs config value</text>

  <rect x="540" y="120" width="140" height="60" class="box"/>
  <text x="610" y="145" class="label">LLM says YES?</text>
  <text x="610" y="163" class="sub">cheap prompt</text>

  <rect x="360" y="240" width="140" height="60" class="box yes"/>
  <text x="430" y="265" class="label">generate_response</text>
  <text x="430" y="283" class="sub">persist + publish</text>

  <rect x="180" y="240" width="140" height="60" class="box no"/>
  <text x="250" y="265" class="label">skip</text>
  <text x="250" y="283" class="sub">(no post written)</text>

  <path d="M 140 150 L 180 150" class="arrow"/>
  <path d="M 320 150 L 360 150" class="arrow"/>
  <path d="M 500 150 L 540 150" class="arrow"/>

  <path d="M 250 180 L 250 240" class="arrow"/>
  <text x="265" y="210" class="edge">no</text>

  <path d="M 430 180 L 300 220 L 260 240" class="arrow"/>
  <text x="345" y="205" class="edge">no</text>

  <path d="M 610 180 L 520 230 L 480 240" class="arrow"/>
  <text x="580" y="205" class="edge">no</text>

  <path d="M 610 180 L 500 260 L 500 270" class="arrow"/>
  <text x="560" y="253" class="edge">yes</text>
</svg>
