services:
  dynamodb:
    image: amazon/dynamodb-local:latest
    container_name: taptupo-dynamodb
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-dbPath", "/data"]
    ports:
      - "8000:8000"
    volumes:
      - dynamodb-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: taptupo-app
    depends_on:
      dynamodb:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      DB_BACKEND: local
      DYNAMODB_ENDPOINT: http://dynamodb:8000
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
    ports:
      - "8080:8080"

volumes:
  dynamodb-data:
