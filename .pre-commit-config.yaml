# Pre-commit hooks. Install with: `uv run pre-commit install`
# Run across all files: `uv run pre-commit run --all-files`

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-ast
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: detect-private-key
      - id: check-added-large-files
        args: ["--maxkb=51200"]  # 50 MB — larger must go through Git LFS

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.0
    hooks:
      - id: mypy
        additional_dependencies:
          - "pydantic>=2.12"
          - "pydantic-settings>=2.0"
          - "structlog>=24.0"
          - "fastapi>=0.115"
          - "starlette>=0.40"
          - "itsdangerous>=2.2"
          - "types-passlib"
          - "aioboto3>=14.0"
          - "botocore>=1.35"
        args: ["--strict"]
        files: ^app/
        exclude: ^tests/

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: ["-c", "quality/static/bandit.yml", "-r", "app"]
        pass_filenames: false

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]

  - repo: local
    hooks:
      - id: unit-tests
        name: unit tests (blocks commit on failure)
        entry: scripts/run_unit_tests.sh
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: safety-deps
        name: safety dependency CVE scan
        # Ignore 88512: langchain<1.2.24 advisory flags a JS subpackage
        # (@langchain/google-cloud-sql-pg) that we do not install; 1.2.24 is
        # not yet published on PyPI. Revisit when upstream fix lands.
        entry: uv run safety check --bare --ignore 88512
        language: system
        pass_filenames: false
        stages: [pre-commit]
