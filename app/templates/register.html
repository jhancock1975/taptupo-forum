{% extends "base.html" %}
{% block title %}Register - Taptupo Forum{% endblock %}
{% block content %}
<div class="auth-container">
    <h1>Register</h1>
    {% if error %}
        <div class="error-message">{{ error }}</div>
    {% endif %}
    <form action="/auth/register" method="post" class="auth-form">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autocomplete="username"
                   pattern="[a-zA-Z0-9_]{3,30}" title="3-30 alphanumeric characters or underscores">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="new-password"
                   minlength="8">
        </div>
        <div class="form-group">
            <label for="password_confirm">Confirm Password</label>
            <input type="password" id="password_confirm" name="password_confirm" required
                   autocomplete="new-password" minlength="8">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Register</button>
    </form>
    <p class="auth-footer">Already have an account? <a href="/auth/login">Login</a></p>
</div>
{% endblock %}
